name: Fill Missing Summaries

on:
  workflow_dispatch:
    inputs:
      force_all:
        description: '全動画の要約を字幕から再生成する（true=全件, false=欠損のみ）'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  fill:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run fill summaries script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FORCE_ALL: ${{ github.event.inputs.force_all }}
        run: python scripts/fill_missing_summaries.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add videos.js
          git diff --cached --quiet || (git commit -m "Regenerate video summaries from transcripts" && git push)

      - name: Deploy to production server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: sv14907.xserver.jp
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /fx-space.com/public_html/videonavi/
          exclude: |
            **/.git*
            **/.git*/**
            **/scripts/**
            **/.github/**
            **/*.md
